spring.application.name=HomeEase
server.port=8080
server.address=0.0.0.0

# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/homeease?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# H2 Console (disabled for MySQL)
spring.h2.console.enabled=false

# Razorpay (replace with your keys)
razorpay.key.id=rzp_test_XXXXXXXXXXXX
razorpay.key.secret=XXXXXXXXXXXXXXXXXXXXXXXX

# Location settings
app.default.search.radius=10
