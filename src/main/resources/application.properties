spring.application.name=HomeEase
server.port=8080
server.address=0.0.0.0

# H2 Database
spring.datasource.url=jdbc:h2:mem:homeservicedb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Razorpay (replace with your keys)
razorpay.key.id=rzp_test_XXXXXXXXXXXX
razorpay.key.secret=XXXXXXXXXXXXXXXXXXXXXXXX

# Location settings
app.default.search.radius=10
