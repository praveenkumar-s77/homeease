<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#212529">
    <title>Expert Profile - HomeEase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/responsive.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        .profile-avatar { width: 100px; height: 100px; border-radius: 50%;
            background: linear-gradient(135deg, #28a745, #20c997);
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 2.5rem; font-weight: bold; }
        .stat-card { text-align: center; padding: 20px; border-radius: 10px; }
        .stat-card h2 { margin: 0; }
        .profile-pic { width: 36px; height: 36px; border-radius: 50%;
            background: linear-gradient(135deg, #28a745, #20c997);
            display: inline-flex; align-items: center; justify-content: center;
            color: white; font-weight: bold; font-size: 0.9rem; cursor: pointer; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/expert/dashboard">🏠 HomeEase</a>
            <div class="ms-auto">
                <div class="dropdown">
                    <div class="profile-pic" data-bs-toggle="dropdown" aria-expanded="false"
                         th:text="${user.fullName.substring(0,1).toUpperCase()}">E</div>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li class="px-3 py-2">
                            <strong th:text="${user.fullName}">Expert</strong>
                            <div class="text-muted small" th:text="${user.email}">email</div>
                        </li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" href="/expert/dashboard"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <form th:action="@{/logout}" method="post">
                                <button type="submit" class="dropdown-item text-danger">
                                    <i class="bi bi-box-arrow-right me-2"></i>Logout
                                </button>
                            </form>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row" th:if="${worker != null}">
            <div class="col-md-5">
                <div class="card shadow">
                    <div class="card-body p-4 text-center">
                        <div class="d-flex justify-content-center mb-3">
                            <div class="profile-avatar">
                                <span th:text="${expert.name.substring(0,1).toUpperCase()}">E</span>
                            </div>
                        </div>
                        <h4 th:text="${expert.name}">Expert Name</h4>
                        <span th:if="${expert.category != null}" class="badge bg-primary mb-2" th:text="${expert.category.name}">Category</span>
                        <span th:if="${expert.verified}" class="badge bg-success mb-2">
                            <i class="bi bi-patch-check-fill"></i> Verified
                        </span>

                        <table class="table table-sm text-start mt-3">
                            <tr>
                                <td class="text-muted"><i class="bi bi-person"></i> Name</td>
                                <td th:text="${expert.name}"></td>
                            </tr>
                            <tr>
                                <td class="text-muted"><i class="bi bi-telephone"></i> Phone</td>
                                <td th:text="${expert.phone}"></td>
                            </tr>
                            <tr>
                                <td class="text-muted"><i class="bi bi-house"></i> Address</td>
                                <td th:text="${expert.address != null ? worker.address : 'Not set'}"></td>
                            </tr>
                            <tr>
                                <td class="text-muted"><i class="bi bi-envelope"></i> Email</td>
                                <td th:text="${user.email}"></td>
                            </tr>
                            <tr>
                                <td class="text-muted"><i class="bi bi-star"></i> Rating</td>
                                <td>⭐ <span th:text="${expert.rating}">0</span> / 5</td>
                            </tr>
                            <tr>
                                <td class="text-muted"><i class="bi bi-currency-rupee"></i> Rate</td>
                                <td th:text="'₹' + ${expert.hourlyRate} + '/hr'"></td>
                            </tr>
                            <tr>
                                <td class="text-muted"><i class="bi bi-card-text"></i> ID Type</td>
                                <td th:text="${expert.idType != null ? worker.idType : 'Not provided'}"></td>
                            </tr>
                            <tr th:if="${expert.skills != null && !worker.skills.isEmpty()}">
                                <td class="text-muted"><i class="bi bi-tools"></i> Skills</td>
                                <td>
                                    <span th:each="skill : ${expert.skills}" class="badge bg-success me-1" th:text="${skill.name}">Skill</span>
                                </td>
                            </tr>
                        </table>
                    </div>
                </div>
            </div>

            <div class="col-md-7">
                <div class="row g-3 mb-4">
                    <div class="col-6">
                        <div class="card bg-primary text-white stat-card">
                            <h2 th:text="${totalCount}">0</h2><small>Total Jobs</small>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="card bg-warning text-dark stat-card">
                            <h2 th:text="${pendingCount}">0</h2><small>In Progress</small>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="card bg-success text-white stat-card">
                            <h2 th:text="${completedCount}">0</h2><small>Completed</small>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="card bg-danger text-white stat-card">
                            <h2 th:text="${cancelledCount}">0</h2><small>Cancelled</small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
