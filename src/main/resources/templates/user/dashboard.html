<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - HomeEase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        .service-card { transition: transform 0.2s; cursor: pointer; }
        .service-card:hover { transform: translateY(-3px); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .stat-card { text-align: center; padding: 15px; }
        .stat-card h3 { margin: 0; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/dashboard">🏠 HomeEase</a>
            <div class="ms-auto d-flex align-items-center">
                <a href="/profile" class="btn btn-outline-light btn-sm me-2">
                    <i class="bi bi-person-circle"></i> <span sec:authentication="name">User</span>
                </a>
                <form th:action="@{/logout}" method="post" class="d-inline">
                    <button type="submit" class="btn btn-outline-danger btn-sm">Logout</button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- Stats Row -->
        <div class="row g-3 mb-4">
            <div class="col-md-3 col-6">
                <div class="card bg-primary text-white stat-card">
                    <h3 th:text="${totalBookings}">0</h3><small>Total Bookings</small>
                </div>
            </div>
            <div class="col-md-3 col-6">
                <div class="card bg-warning text-dark stat-card">
                    <h3 th:text="${pendingBookings}">0</h3><small>Pending</small>
                </div>
            </div>
            <div class="col-md-3 col-6">
                <div class="card bg-success text-white stat-card">
                    <h3 th:text="${completedBookings}">0</h3><small>Completed</small>
                </div>
            </div>
            <div class="col-md-3 col-6">
                <div class="card bg-danger text-white stat-card">
                    <h3 th:text="${cancelledBookings}">0</h3><small>Cancelled</small>
                </div>
            </div>
        </div>

        <!-- If user has bookings, show them FIRST -->
        <div th:if="${hasBookings}">
            <h4>My Bookings</h4>
            <div class="table-responsive mb-4">
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>#</th><th>Service</th><th>Date</th><th>Time</th>
                            <th>Address</th><th>Worker</th><th>Status</th><th>Payment</th><th>Amount</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="b : ${bookings}">
                            <td th:text="${b.id}"></td>
                            <td th:text="${b.category.name}"></td>
                            <td th:text="${b.bookingDate}"></td>
                            <td th:text="${b.bookingTime}"></td>
                            <td th:text="${b.address}"></td>
                            <td>
                                <span th:if="${b.worker != null}" th:text="${b.worker.name}"></span>
                                <span th:if="${b.worker == null}" class="text-muted small">Not assigned</span>
                            </td>
                            <td>
                                <span class="badge"
                                      th:classappend="${b.status.name() == 'PENDING' ? 'bg-warning' :
                                                       (b.status.name() == 'CONFIRMED' ? 'bg-primary' :
                                                       (b.status.name() == 'COMPLETED' ? 'bg-success' : 'bg-danger'))}"
                                      th:text="${b.status}"></span>
                            </td>
                            <td>
                                <span class="badge"
                                      th:classappend="${b.paymentStatus.name() == 'PAID' ? 'bg-success' : 'bg-secondary'}"
                                      th:text="${b.paymentStatus}"></span>
                                <a th:if="${b.paymentStatus.name() == 'UNPAID' && b.paymentId != 'CASH_ON_SERVICE'}"
                                   th:href="@{/payment/{id}(id=${b.id})}" class="btn btn-sm btn-outline-primary ms-1">Pay</a>
                            </td>
                            <td th:text="'₹' + ${b.amount}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Services Section -->
        <h4>Book a Service</h4>
        <div class="row g-3 mb-4">
            <div th:each="cat : ${categories}" class="col-md-4">
                <div class="card service-card h-100 text-center p-3">
                    <div class="card-body">
                        <h5 th:text="${cat.name}">Service</h5>
                        <p class="text-muted small" th:text="${cat.description}">Desc</p>
                        <a th:href="@{/book/{id}(id=${cat.id})}" class="btn btn-primary btn-sm">Book Now</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
