<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#212529">
    <title>My Profile - HomeEase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/responsive.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        .profile-avatar { width: 100px; height: 100px; border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 2.5rem; font-weight: bold; }
        .stat-card { text-align: center; padding: 20px; border-radius: 10px; }
        .stat-card h2 { margin: 0; }
        .heart-btn { background: none; border: none; font-size: 1.3rem; cursor: pointer; color: #dc3545; }
        .heart-btn:hover { transform: scale(1.2); }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/dashboard">🏠 HomeEase</a>
            <div class="ms-auto">
                <a href="/dashboard" class="btn btn-outline-light btn-sm me-2">Dashboard</a>
                <form th:action="@{/logout}" method="post" class="d-inline">
                    <button type="submit" class="btn btn-outline-danger btn-sm">Logout</button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <!-- Personal Details -->
            <div class="col-md-4">
                <div class="card shadow">
                    <div class="card-body p-4 text-center">
                        <div class="d-flex justify-content-center mb-3">
                            <div class="profile-avatar">
                                <span th:text="${user.fullName.substring(0,1).toUpperCase()}">U</span>
                            </div>
                        </div>
                        <h4 th:text="${user.fullName}">Full Name</h4>
                        <span class="badge bg-primary mb-3">USER</span>


                        <table class="table table-sm text-start mt-3">
                            <tr>
                                <td class="text-muted"><i class="bi bi-person"></i> Name</td>
                                <td th:text="${user.fullName}"></td>
                            </tr>
                            <tr>
                                <td class="text-muted"><i class="bi bi-telephone"></i> Phone</td>
                                <td th:text="${user.phone != null ? user.phone : 'Not provided'}"></td>
                            </tr>
                            <tr>
                                <td class="text-muted"><i class="bi bi-envelope"></i> Email</td>
                                <td th:text="${user.email}"></td>
                            </tr>
                            <tr>
                                <td class="text-muted"><i class="bi bi-house"></i> Address</td>
                                <td th:text="${user.permanentAddress != null ? user.permanentAddress : 'Not set'}"></td>
                            </tr>
                        </table>
                        <a href="/profile/edit" class="btn btn-outline-primary btn-sm w-100 mt-2">
                            <i class="bi bi-pencil"></i> Edit Profile
                        </a>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <!-- Booking Stats -->
                <div class="row g-3 mb-4">
                    <div class="col-md-3 col-6">
                        <div class="card bg-primary text-white stat-card">
                            <h2 th:text="${totalBookings}">0</h2><small>Total</small>
                        </div>
                    </div>
                    <div class="col-md-3 col-6">
                        <div class="card bg-warning text-dark stat-card">
                            <h2 th:text="${pendingBookings}">0</h2><small>Pending</small>
                        </div>
                    </div>
                    <div class="col-md-3 col-6">
                        <div class="card bg-success text-white stat-card">
                            <h2 th:text="${completedBookings}">0</h2><small>Completed</small>
                        </div>
                    </div>
                    <div class="col-md-3 col-6">
                        <div class="card bg-danger text-white stat-card">
                            <h2 th:text="${cancelledBookings}">0</h2><small>Cancelled</small>
                        </div>
                    </div>
                </div>

                <!-- Wishlisted Experts -->
                <div class="card shadow">
                    <div class="card-body p-4">
                        <h5><i class="bi bi-heart-fill text-danger"></i> Wishlisted Experts
                            <span class="badge bg-secondary" th:text="${#lists.size(wishlist)}">0</span>
                        </h5>
                        <div th:if="${#lists.isEmpty(wishlist)}" class="text-center text-muted py-4">
                            <i class="bi bi-heart" style="font-size:2rem;"></i>
                            <p class="mt-2">No wishlisted Experts yet. Add Experts while booking.</p>
                        </div>
                        <div th:unless="${#lists.isEmpty(wishlist)}">
                            <div th:each="w : ${wishlist}" class="card mb-2">
                                <div class="card-body p-3 d-flex justify-content-between align-items-center">
                                    <div>
                                        <strong th:text="${w.Expert.name}">Expert</strong>
                                        <span th:if="${w.Expert.verified}" class="ms-1">
                                            <i class="bi bi-patch-check-fill text-primary"></i>
                                        </span>
                                        <div class="text-muted small">
                                            <span th:text="${w.Expert.category.name}">Category</span> ·
                                            ⭐ <span th:text="${w.Expert.rating}">4.5</span> ·
                                            ₹<span th:text="${w.Expert.hourlyRate}">300</span>/hr
                                        </div>
                                        <div class="text-muted small" th:text="${w.Expert.address}">Area</div>
                                    </div>
                                    <form th:action="@{/wishlist/remove/{id}(id=${w.Expert.id})}" method="post">
                                        <button type="submit" class="heart-btn" title="Remove from wishlist">
                                            <i class="bi bi-heart-fill"></i>
                                        </button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
