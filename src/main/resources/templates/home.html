<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#212529">
    <title>HomeEase - Home Service Booking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/responsive.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        .hero { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 80px 0; }
        .service-card { transition: transform 0.2s; cursor: pointer; }
        .service-card:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0,0,0,0.15); }
        .service-icon { width: 80px; height: 80px; border-radius: 50%; display: inline-flex;
            align-items: center; justify-content: center; font-size: 2rem; color: white; margin-bottom: 15px; }
        .icon-plumbing { background: linear-gradient(135deg, #0d6efd, #6610f2); }
        .icon-electrical { background: linear-gradient(135deg, #ffc107, #fd7e14); }
        .icon-tiles { background: linear-gradient(135deg, #198754, #20c997); }
        .icon-cleaning { background: linear-gradient(135deg, #0dcaf0, #0d6efd); }
        .icon-painting { background: linear-gradient(135deg, #d63384, #e91e8a); }
        .icon-carpentry { background: linear-gradient(135deg, #8B4513, #D2691E); }
        .icon-default { background: linear-gradient(135deg, #6c757d, #495057); }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">🏠 HomeEase</a>
            <div class="ms-auto">
                <a href="/login" class="btn btn-outline-light me-2">Login</a>
                <a href="/register" class="btn btn-light">Register</a>
            </div>
        </div>
    </nav>

    <section class="hero text-center">
        <div class="container">
            <h1 class="display-4 fw-bold">Home Services at Your Doorstep</h1>
            <p class="lead mt-3">Making home maintenance effortless.</p>
            <a href="/about" class="btn btn-light btn-lg mt-3">Get Started</a>
        </div>
    </section>

    <section class="container my-5">
        <h2 class="text-center mb-4">Our Services</h2>
        <div class="row g-4">
            <div th:each="cat : ${categories}" class="col-md-4">
                <div class="card service-card h-100 text-center p-4">
                    <div class="card-body">
                        <div th:switch="${cat.name}">
                            <div th:case="'Plumbing'" class="service-icon icon-plumbing mx-auto"><i class="bi bi-droplet-fill"></i></div>
                            <div th:case="'Electrical'" class="service-icon icon-electrical mx-auto"><i class="bi bi-lightning-fill"></i></div>
                            <div th:case="'Tiles &amp; Flooring'" class="service-icon icon-tiles mx-auto"><i class="bi bi-grid-3x3-gap-fill"></i></div>
                            <div th:case="'Syntex &amp; Tank Cleaning'" class="service-icon icon-cleaning mx-auto"><i class="bi bi-water"></i></div>
                            <div th:case="'Painting'" class="service-icon icon-painting mx-auto"><i class="bi bi-palette-fill"></i></div>
                            <div th:case="'Carpentry'" class="service-icon icon-carpentry mx-auto"><i class="bi bi-hammer"></i></div>
                            <div th:case="*" class="service-icon icon-default mx-auto"><i class="bi bi-tools"></i></div>
                        </div>
                        <h4 class="card-title" th:text="${cat.name}">Service</h4>
                        <p class="card-text text-muted" th:text="${cat.description}">Description</p>
                        <a href="/login" class="btn btn-primary">Book Now</a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="bg-dark text-white text-center py-3 mt-5">
        <p class="mb-0">&copy; 2026 HomeEase. Making home maintenance effortless.</p>
    </footer>
</body>
</html>
