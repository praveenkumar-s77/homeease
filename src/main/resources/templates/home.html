<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomeEase - Home Service Booking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        .hero { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 80px 0; }
        .service-card { transition: transform 0.2s; cursor: pointer; }
        .service-card:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0,0,0,0.15); }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">🏠 HomeEase</a>
            <div class="ms-auto">
                <a href="/login" class="btn btn-outline-light me-2">Login</a>
                <a href="/register" class="btn btn-light">Register</a>
            </div>
        </div>
    </nav>

    <section class="hero text-center">
        <div class="container">
            <h1 class="display-4 fw-bold">Home Services at Your Doorstep</h1>
            <p class="lead mt-3">Making home maintenance effortless.</p>
            <a href="/register" class="btn btn-light btn-lg mt-3">Get Started</a>
        </div>
    </section>

    <section class="container my-5">
        <h2 class="text-center mb-4">Our Services</h2>
        <div class="row g-4">
            <div th:each="cat : ${categories}" class="col-md-4">
                <div class="card service-card h-100 text-center p-4">
                    <div class="card-body">
                        <h4 class="card-title" th:text="${cat.name}">Service</h4>
                        <p class="card-text text-muted" th:text="${cat.description}">Description</p>
                        <a href="/login" class="btn btn-primary">Book Now</a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="bg-dark text-white text-center py-3 mt-5">
        <p class="mb-0">&copy; 2026 HomeEase. Making home maintenance effortless.</p>
    </footer>
</body>
</html>
