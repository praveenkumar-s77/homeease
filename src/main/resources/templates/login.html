<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - HomeEase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container">
        <div class="row justify-content-center mt-5">
            <div class="col-md-5">
                <div class="card shadow">
                    <div class="card-body p-4">
                        <h3 class="text-center mb-4">🏠 HomeEase Login</h3>

                        <div th:if="${param.error}" class="alert alert-danger">Invalid username or password.</div>
                        <div th:if="${param.logout}" class="alert alert-info">You have been logged out.</div>
                        <div th:if="${param.registered}" class="alert alert-success">Registration successful. Please login.</div>

                        <form th:action="@{/login}" method="post">
                            <div class="mb-3">
                                <label for="username" class="form-label">Username</label>
                                <input type="text" id="username" name="username" class="form-control" required autofocus>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Password</label>
                                <input type="password" id="password" name="password" class="form-control" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Login</button>
                        </form>
                        <p class="text-center mt-3">
                            Don't have an account? <a href="/register">Register here</a>
                        </p>
                        <hr>
                        <p class="text-muted small text-center">
                            Demo: admin/admin123 (Admin) | user/user123 (User) | worker/worker123 (Worker)
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
