<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#212529">
    <title>Register - HomeEase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/responsive.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container">
        <div class="row justify-content-center mt-5">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-body p-4">
                        <h3 class="text-center mb-4">🏠 Create Account</h3>

                        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                        <form th:action="@{/register}" method="post" th:object="${user}">
                            <div class="mb-3">
                                <label for="fullName" class="form-label">Full Name <span class="text-danger">*</span></label>
                                <input type="text" id="fullName" th:field="*{fullName}" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label for="username" class="form-label">Username <span class="text-danger">*</span></label>
                                <input type="text" id="username" th:field="*{username}" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label for="email" class="form-label">Email <span class="text-danger">*</span></label>
                                <input type="email" id="email" th:field="*{email}" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label for="phone" class="form-label">Phone <span class="text-danger">*</span></label>
                                <input type="tel" id="phone" th:field="*{phone}" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label for="permanentAddress" class="form-label">Permanent Address <span class="text-danger">*</span></label>
                                <textarea id="permanentAddress" th:field="*{permanentAddress}" class="form-control" rows="2" required></textarea>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Password <span class="text-danger">*</span></label>
                                <input type="password" id="password" th:field="*{password}" class="form-control" required minlength="6">
                            </div>
                            <div class="mb-3">
                                <label for="confirmPassword" class="form-label">Confirm Password <span class="text-danger">*</span></label>
                                <input type="password" id="confirmPassword" name="confirmPassword" class="form-control" required minlength="6">
                                <div id="passwordError" class="text-danger small mt-1" style="display:none;">Passwords do not match</div>
                            </div>
                            <button type="submit" class="btn btn-primary w-100" id="registerBtn">Register</button>
                        </form>
                        <p class="text-center mt-3">
                            Already have an account? <a href="/login">Login here</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        const pwd = document.getElementById('password');
        const confirmPwd = document.getElementById('confirmPassword');
        const errMsg = document.getElementById('passwordError');
        const form = document.querySelector('form');

        function checkMatch() {
            if (confirmPwd.value && pwd.value !== confirmPwd.value) {
                errMsg.style.display = 'block';
                confirmPwd.setCustomValidity('Passwords do not match');
            } else {
                errMsg.style.display = 'none';
                confirmPwd.setCustomValidity('');
            }
        }
        pwd.addEventListener('input', checkMatch);
        confirmPwd.addEventListener('input', checkMatch);

        form.addEventListener('submit', function(e) {
            if (pwd.value !== confirmPwd.value) {
                e.preventDefault();
                errMsg.style.display = 'block';
                confirmPwd.focus();
            }
        });
    </script>
</body>
</html>
