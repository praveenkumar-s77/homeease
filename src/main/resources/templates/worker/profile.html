<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worker Profile - HomeEase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        .profile-avatar { width: 100px; height: 100px; border-radius: 50%;
            background: linear-gradient(135deg, #28a745, #20c997);
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 2.5rem; font-weight: bold; }
        .stat-card { text-align: center; padding: 20px; border-radius: 10px; }
        .stat-card h2 { margin: 0; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/worker/dashboard">🏠 HomeEase Worker</a>
            <div class="ms-auto">
                <a href="/worker/dashboard" class="btn btn-outline-light btn-sm">Dashboard</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-5">
                <div class="card shadow">
                    <div class="card-body p-4 text-center">
                        <div class="d-flex justify-content-center mb-3">
                            <div class="profile-avatar">
                                <span th:text="${worker.name.substring(0,1).toUpperCase()}">W</span>
                            </div>
                        </div>
                        <h4 th:text="${worker.name}">Worker Name</h4>
                        <span class="badge bg-primary mb-2" th:text="${worker.category.name}">Category</span>
                        <span th:if="${worker.verified}" class="badge bg-success mb-2">
                            <i class="bi bi-patch-check-fill"></i> Verified
                        </span>

                        <table class="table table-sm text-start mt-3">
                            <tr>
                                <td class="text-muted"><i class="bi bi-person"></i> Name</td>
                                <td th:text="${worker.name}"></td>
                            </tr>
                            <tr>
                                <td class="text-muted"><i class="bi bi-telephone"></i> Phone</td>
                                <td th:text="${worker.phone}"></td>
                            </tr>
                            <tr>
                                <td class="text-muted"><i class="bi bi-house"></i> Address</td>
                                <td th:text="${worker.address != null ? worker.address : 'Not set'}"></td>
                            </tr>
                            <tr>
                                <td class="text-muted"><i class="bi bi-envelope"></i> Email</td>
                                <td th:text="${user.email}"></td>
                            </tr>
                            <tr>
                                <td class="text-muted"><i class="bi bi-star"></i> Rating</td>
                                <td>⭐ <span th:text="${worker.rating}">0</span> / 5</td>
                            </tr>
                            <tr>
                                <td class="text-muted"><i class="bi bi-currency-rupee"></i> Rate</td>
                                <td th:text="'₹' + ${worker.hourlyRate} + '/hr'"></td>
                            </tr>
                            <tr>
                                <td class="text-muted"><i class="bi bi-card-text"></i> ID Type</td>
                                <td th:text="${worker.idType != null ? worker.idType : 'Not provided'}"></td>
                            </tr>
                        </table>
                    </div>
                </div>
            </div>

            <div class="col-md-7">
                <div class="row g-3 mb-4">
                    <div class="col-6">
                        <div class="card bg-primary text-white stat-card">
                            <h2 th:text="${totalCount}">0</h2><small>Total Jobs</small>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="card bg-warning text-dark stat-card">
                            <h2 th:text="${pendingCount}">0</h2><small>In Progress</small>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="card bg-success text-white stat-card">
                            <h2 th:text="${completedCount}">0</h2><small>Completed</small>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="card bg-danger text-white stat-card">
                            <h2 th:text="${cancelledCount}">0</h2><small>Cancelled</small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
