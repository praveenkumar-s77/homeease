<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Workers - HomeEase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/admin/dashboard">🏠 HomeEase Admin</a>
            <div class="ms-auto">
                <a href="/admin/dashboard" class="btn btn-outline-light btn-sm me-2">Dashboard</a>
                <a href="/admin/bookings" class="btn btn-outline-light btn-sm">Bookings</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3>Workers</h3>
            <a href="/admin/workers/add" class="btn btn-success">+ Add Worker</a>
        </div>

        <div class="table-responsive">
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>#</th><th>Name</th><th>Phone</th><th>Category</th>
                        <th>Rate/hr</th><th>Rating</th><th>ID Verified</th><th>Available</th><th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="w : ${workers}">
                        <td th:text="${w.id}"></td>
                        <td th:text="${w.name}"></td>
                        <td th:text="${w.phone}"></td>
                        <td th:text="${w.category?.name}"></td>
                        <td th:text="'₹' + ${w.hourlyRate}"></td>
                        <td th:text="${w.rating} + ' ⭐'"></td>
                        <td>
                            <span class="badge" th:classappend="${w.verified ? 'bg-success' : 'bg-danger'}"
                                  th:text="${w.verified ? 'Verified' : 'Unverified'}"></span>
                            <div class="small text-muted" th:if="${w.idType != null}"
                                 th:text="${w.idType}"></div>
                        </td>
                        <td>
                            <span class="badge" th:classappend="${w.available ? 'bg-success' : 'bg-secondary'}"
                                  th:text="${w.available ? 'Yes' : 'No'}"></span>
                        </td>
                        <td>
                            <a th:href="@{/admin/workers/edit/{id}(id=${w.id})}" class="btn btn-sm btn-warning">Edit</a>
                            <a th:href="@{/admin/workers/delete/{id}(id=${w.id})}" class="btn btn-sm btn-danger"
                               onclick="return confirm('Delete this worker?')">Delete</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
