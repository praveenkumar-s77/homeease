<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#212529">
    <title>Expert Form - HomeEase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/responsive.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/admin/dashboard">🏠 HomeEase Admin</a>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-body p-4">
                        <h4 th:text="${expert.id != null ? 'Edit Expert' : 'Add Expert'}">Expert Form</h4>

                        <form th:action="@{/admin/workers/save}" method="post" th:object="${expert}">
                            <input type="hidden" th:field="*{id}">
                            <div class="mb-3">
                                <label for="name" class="form-label">Name</label>
                                <input type="text" id="name" th:field="*{name}" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label for="phone" class="form-label">Phone</label>
                                <input type="tel" id="phone" th:field="*{phone}" class="form-control">
                            </div>
                            <div class="mb-3">
                                <label for="address" class="form-label">Address</label>
                                <input type="text" id="address" th:field="*{address}" class="form-control">
                            </div>
                            <div class="mb-3">
                                <label for="categoryId" class="form-label">Service Category</label>
                                <select id="categoryId" name="categoryId" class="form-select" required>
                                    <option value="">Select Category</option>
                                    <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"
                                            th:selected="${expert.category != null && Expert.category.id == cat.id}"></option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="hourlyRate" class="form-label">Hourly Rate (₹)</label>
                                <input type="number" id="hourlyRate" th:field="*{hourlyRate}" class="form-control" step="50">
                            </div>
                            <div class="mb-3">
                                <label for="rating" class="form-label">Rating</label>
                                <input type="number" id="rating" th:field="*{rating}" class="form-control" min="0" max="5" step="0.1">
                            </div>
                            <div class="form-check mb-3">
                                <input type="checkbox" id="available" th:field="*{available}" class="form-check-input">
                                <label for="available" class="form-check-label">Available</label>
                            </div>
                            <h6 class="mt-3">ID Verification (required)</h6>
                            <div class="row">
                                <div class="col-6 mb-3">
                                    <label for="idType" class="form-label">ID Type</label>
                                    <select id="idType" th:field="*{idType}" class="form-select" required>
                                        <option value="">Select ID Type</option>
                                        <option value="AADHAAR">Aadhaar Card</option>
                                        <option value="PAN">PAN Card</option>
                                        <option value="DRIVING_LICENCE">Driving Licence</option>
                                    </select>
                                </div>
                                <div class="col-6 mb-3">
                                    <label for="idNumber" class="form-label">ID Number</label>
                                    <input type="text" id="idNumber" th:field="*{idNumber}" class="form-control" required
                                           placeholder="Enter ID number">
                                </div>
                            </div>
                            <div class="form-check mb-3">
                                <input type="checkbox" id="verified" th:field="*{verified}" class="form-check-input">
                                <label for="verified" class="form-check-label">ID Verified by Admin</label>
                            </div>

                            <h6 class="mt-3">Location (for nearby matching)</h6>
                            <div class="row">
                                <div class="col-6 mb-3">
                                    <label for="latitude" class="form-label">Latitude</label>
                                    <input type="number" id="latitude" th:field="*{latitude}" class="form-control" step="0.0001">
                                </div>
                                <div class="col-6 mb-3">
                                    <label for="longitude" class="form-label">Longitude</label>
                                    <input type="number" id="longitude" th:field="*{longitude}" class="form-control" step="0.0001">
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Save Expert</button>
                            <a href="/admin/workers" class="btn btn-outline-secondary w-100 mt-2">Cancel</a>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
