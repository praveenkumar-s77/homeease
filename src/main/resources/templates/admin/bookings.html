<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Bookings - HomeEase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/admin/dashboard">🏠 HomeEase Admin</a>
            <div class="ms-auto">
                <a href="/admin/dashboard" class="btn btn-outline-light btn-sm me-2">Dashboard</a>
                <a href="/admin/workers" class="btn btn-outline-light btn-sm">Workers</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h3>All Bookings</h3>
        <div class="table-responsive mt-3">
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>#</th><th>User</th><th>Service</th><th>Date</th><th>Time</th>
                        <th>Address</th><th>Worker</th><th>Status</th><th>Payment</th><th>Amount</th><th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="b : ${bookings}">
                        <td th:text="${b.id}"></td>
                        <td th:text="${b.user.fullName}"></td>
                        <td th:text="${b.category.name}"></td>
                        <td th:text="${b.bookingDate}"></td>
                        <td th:text="${b.bookingTime}"></td>
                        <td th:text="${b.address}"></td>
                        <td th:text="${b.worker != null ? b.worker.name : 'Not Assigned'}"></td>
                        <td>
                            <span class="badge"
                                  th:classappend="${b.status.name() == 'PENDING' ? 'bg-warning' :
                                                   (b.status.name() == 'CONFIRMED' ? 'bg-primary' :
                                                   (b.status.name() == 'COMPLETED' ? 'bg-success' : 'bg-danger'))}"
                                  th:text="${b.status}">Status</span>
                        </td>
                        <td>
                            <span class="badge"
                                  th:classappend="${b.paymentStatus.name() == 'PAID' ? 'bg-success' : 'bg-secondary'}"
                                  th:text="${b.paymentStatus}">Payment</span>
                        </td>
                        <td th:text="'₹' + ${b.amount}"></td>
                        <td>
                            <form th:action="@{/admin/bookings/{id}/status(id=${b.id})}" method="post" class="d-inline">
                                <select name="status" class="form-select form-select-sm d-inline w-auto" onchange="this.form.submit()">
                                    <option value="">Change...</option>
                                    <option value="CONFIRMED">Confirm</option>
                                    <option value="COMPLETED">Complete</option>
                                    <option value="CANCELLED">Cancel</option>
                                </select>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
