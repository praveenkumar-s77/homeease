<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#212529">
    <title>Admin Dashboard - HomeEase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/responsive.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        .stat-card { text-align: center; padding: 20px; border-radius: 10px; }
        .stat-card h2 { margin: 0; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/admin/dashboard">🏠 HomeEase Admin</a>
            <div class="ms-auto d-flex align-items-center">
                <a href="/admin/workers" class="btn btn-outline-light btn-sm me-2">Experts</a>
                <a href="/admin/bookings" class="btn btn-outline-light btn-sm me-2">Bookings</a>
                <form th:action="@{/logout}" method="post" class="d-inline">
                    <button type="submit" class="btn btn-outline-danger btn-sm">Logout</button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h3>Admin Dashboard</h3>

        <!-- Overview Stats -->
        <div class="row g-3 mt-2 mb-4">
            <div class="col-md-2 col-4">
                <div class="card bg-primary text-white stat-card">
                    <h2 th:text="${totalBookings}">0</h2><small>Total Bookings</small>
                </div>
            </div>
            <div class="col-md-2 col-4">
                <div class="card bg-warning text-dark stat-card">
                    <h2 th:text="${pendingBookings}">0</h2><small>Pending</small>
                </div>
            </div>
            <div class="col-md-2 col-4">
                <div class="card bg-info text-white stat-card">
                    <h2 th:text="${confirmedBookings}">0</h2><small>Confirmed</small>
                </div>
            </div>
            <div class="col-md-2 col-4">
                <div class="card bg-success text-white stat-card">
                    <h2 th:text="${completedBookings}">0</h2><small>Completed</small>
                </div>
            </div>
            <div class="col-md-2 col-4">
                <div class="card bg-danger text-white stat-card">
                    <h2 th:text="${cancelledBookings}">0</h2><small>Cancelled</small>
                </div>
            </div>
            <div class="col-md-2 col-4">
                <div class="card bg-secondary text-white stat-card">
                    <h2 th:text="${#lists.size(categories)}">0</h2><small>Categories</small>
                </div>
            </div>
        </div>

        <div class="row g-4">
            <!-- Users Section -->
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white d-flex justify-content-between">
                        <span><i class="bi bi-people"></i> Users</span>
                        <span class="badge bg-light text-primary" th:text="${totalUsers}">0</span>
                    </div>
                    <div class="card-body" style="max-height:300px;overflow-y:auto;">
                        <table class="table table-sm">
                            <thead><tr><th>Name</th><th>Email</th><th>Phone</th></tr></thead>
                            <tbody>
                                <tr th:each="u : ${users}" th:if="${u.role.name() == 'USER'}">
                                    <td th:text="${u.fullName}"></td>
                                    <td th:text="${u.email}"></td>
                                    <td th:text="${u.phone}"></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Experts Section -->
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-success text-white d-flex justify-content-between">
                        <span><i class="bi bi-wrench"></i> Experts</span>
                        <span class="badge bg-light text-success" th:text="${#lists.size(experts)}">0</span>
                    </div>
                    <div class="card-body" style="max-height:300px;overflow-y:auto;">
                        <table class="table table-sm">
                            <thead><tr><th>Name</th><th>Category</th><th>Rating</th><th>Verified</th></tr></thead>
                            <tbody>
                                <tr th:each="w : ${experts}">
                                    <td th:text="${w.name}"></td>
                                    <td th:text="${w.category?.name}"></td>
                                    <td>⭐ <span th:text="${w.rating}"></span></td>
                                    <td>
                                        <span class="badge" th:classappend="${w.verified ? 'bg-success' : 'bg-danger'}"
                                              th:text="${w.verified ? 'Yes' : 'No'}"></span>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <!-- Booking Dashboard -->
        <h4 class="mt-4">All Bookings</h4>
        <div class="table-responsive">
            <table class="table table-striped">
                <thead>
                    <tr><th>#</th><th>User</th><th>Service</th><th>Date</th><th>Expert</th><th>Status</th><th>Payment</th><th>Amount</th></tr>
                </thead>
                <tbody>
                    <tr th:each="b : ${bookings}">
                        <td th:text="${b.id}"></td>
                        <td th:text="${b.user.fullName}"></td>
                        <td th:text="${b.category.name}"></td>
                        <td th:text="${b.bookingDate}"></td>
                        <td th:text="${b.expert != null ? b.expert.name : 'Not Assigned'}"></td>
                        <td>
                            <span class="badge"
                                  th:classappend="${b.status.name() == 'PENDING' ? 'bg-warning' :
                                                   (b.status.name() == 'CONFIRMED' ? 'bg-info' :
                                                   (b.status.name() == 'COMPLETED' ? 'bg-success' : 'bg-danger'))}"
                                  th:text="${b.status}"></span>
                        </td>
                        <td>
                            <span class="badge"
                                  th:classappend="${b.paymentStatus.name() == 'PAID' ? 'bg-success' : 'bg-secondary'}"
                                  th:text="${b.paymentStatus}"></span>
                        </td>
                        <td th:text="'₹' + ${b.amount}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
